<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KWVI Terminal Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Mode+7&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; 
            color: #d1d5db; 
            font-family: 'Source Code Pro', monospace; 
            margin: 0; 
            padding: 20px; 
            text-transform: uppercase; 
        }

        .board-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            border: 4px solid #1a1a1a; 
            padding: 20px; 
            background-color: #050505; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9); 
        }

        .header-section {
            border-bottom: 2px dashed #222;
            padding-bottom: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { 
            color: #ff9f00; 
            letter-spacing: 3px; 
            font-size: 2.8rem; 
            margin: 0; 
        }

        .time-display { 
            text-align: right; 
            color: #10b981; 
            font-size: 1.4rem; 
        }

        .section-header-container {
            display: flex;
            align-items: center;
            margin-top: 35px;
            margin-bottom: 10px;
        }

        .icon {
            color: #ff9f00;
            font-size: 2.2rem;
            margin-right: 15px;
            display: inline-block;
        }

        .section-title { 
            color: #ff9f00; 
            font-size: 1.8rem; 
            text-decoration: underline; 
            margin: 0;
            font-weight: 700;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 1.3rem; 
        }

        th { 
            text-align: left; 
            padding: 10px; 
            color: #9ca3af; 
            border-bottom: 1px solid #222; 
        }

        td { 
            padding: 10px; 
            border-bottom: 1px solid #111; 
            color: #ff9f00; 
            font-family: 'Mode 7', monospace; 
            letter-spacing: 1px;
        }

        .flight-id { font-weight: bold; }

        /* Weather Section Styling */
        .weather-grid {
            display: flex;
            justify-content: space-between;
            background-color: #0a0a0a;
            border: 1px solid #222;
            padding: 20px;
            margin-top: 10px;
        }

        .wx-label {
            color: #9ca3af;
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .wx-data {
            color: #ff9f00;
            font-family: 'Mode 7', monospace;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

<div class="board-container">
    <div class="header-section">
        <h1>KWVI CONTROL TOWER</h1>
        <div class="time-display" id="clock">00:00:00 PST</div>
    </div>

    <div class="section-header-container">
        <div class="icon">&#9992;</div> <div class="section-title">DEPARTURES</div>
    </div>
    <table>
        <thead>
            <tr><th>Flight</th><th>Type</th><th>Destination</th><th>Time</th></tr>
        </thead>
        <tbody id="departures-list">
            <tr><td colspan="4">LOADING DATA...</td></tr>
        </tbody>
    </table>

    <div class="section-header-container">
        <div class="icon">&#9992;</div> <div class="section-title">ARRIVALS</div>
    </div>
    <table>
        <thead>
            <tr><th>Flight</th><th>Type</th><th>Origin</th><th>Time</th></tr>
        </thead>
        <tbody id="arrivals-list">
            <tr><td colspan="4">LOADING DATA...</td></tr>
        </tbody>
    </table>

    <div class="section-header-container">
        <div class="icon">&#9728;</div> <div class="section-title">LOCAL WEATHER</div>
    </div>
    <div class="weather-grid">
        <div><span class="wx-label">CONDITIONS:</span> <span id="wx-cond" class="wx-data">FETCHING...</span></div>
        <div><span class="wx-label">TEMP:</span> <span id="wx-temp" class="wx-data">--</span></div>
        <div><span class="wx-label">WIND:</span> <span id="wx-wind" class="wx-data">--</span></div>
    </div>
</div>

<script>
    // 1. Live ticking clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false }) + ' PST';
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Fetch Flights from your GitHub Action
    fetch('Flights.json')
        .then(response => {
            if (!response.ok) throw new Error("File not found");
            return response.json();
        })
        .then(data => {
            const buildRow = f => `<tr><td class="flight-id">${f.ident}</td><td>${f.type || 'GA'}</td><td>${f.origin || f.destination}</td><td>${f.time || '--:--'}</td></tr>`;
            document.getElementById('arrivals-list').innerHTML = data.arrivals.length ? data.arrivals.map(buildRow).join('') : '<tr><td colspan="4">NO ARRIVALS</td></tr>';
            document.getElementById('departures-list').innerHTML = data.departures.length ? data.departures.map(buildRow).join('') : '<tr><td colspan="4">NO DEPARTURES</td></tr>';
        })
        .catch(() => {
            document.getElementById('arrivals-list').innerHTML = `<tr><td colspan="4">AWAITING SIGNAL...</td></tr>`;
            document.getElementById('departures-list').innerHTML = `<tr><td colspan="4">AWAITING SIGNAL...</td></tr>`;
        });

    // 3. Fetch Real-time Weather from National Weather Service (KWVI Station)
    fetch('https://api.weather.gov/stations/KWVI/observations/latest')
        .then(res => res.json())
        .then(data => {
            const props = data.properties;
            
            // Convert Celsius to Fahrenheit
            const tempC = props.temperature.value;
            const tempF = tempC !== null ? Math.round((tempC * 9/5) + 32) + '°F' : 'N/A';
            
            // Format Wind (e.g., 270° @ 10 MPH)
            const windDir = props.windDirection.value !== null ? props.windDirection.value + '°' : 'VAR';
            const windSpeedMph = props.windSpeed.value !== null ? Math.round(props.windSpeed.value * 0.621371) : 0;
            const windStr = windSpeedMph > 0 ? `${windDir} @ ${windSpeedMph} MPH` : 'CALM';
            
            // Format Conditions
            const condStr = props.textDescription || 'CLEAR';

            document.getElementById('wx-temp').textContent = tempF;
            document.getElementById('wx-wind').textContent = windStr;
            document.getElementById('wx-cond').textContent = condStr.toUpperCase();
        })
        .catch(() => {
            document.getElementById('wx-cond').textContent = "UNAVAILABLE";
        });
</script>

</body>
</html>
