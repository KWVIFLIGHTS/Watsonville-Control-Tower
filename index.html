<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KWVI Terminal Board (Split-Flap View)</title>
    <link href="https://fonts.googleapis.com/css2?family=Mode+7&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; 
            color: #d1d5db; 
            font-family: 'Source Code Pro', monospace; /* Strong Technical feel fallback */
            margin: 0; 
            padding: 20px; 
            text-transform: uppercase; 
        }

        .board-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            border: 4px solid #1a1a1a; 
            padding: 20px; 
            background-color: #050505; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9); 
        }

        .header-section {
            border-bottom: 2px dashed #222;
            padding-bottom: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { 
            color: #ff9f00; /* Amber from the reference image */
            letter-spacing: 3px; 
            font-size: 2.8rem; 
            margin: 0; 
        }

        .time-display { 
            text-align: right; 
            color: #10b981; 
            font-size: 1.4rem; 
        }

        .section-header-container {
            display: flex;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .plane-logo {
            color: #ff9f00;
            font-size: 2.5rem;
            margin-right: 15px;
            /* Placeholder for plane logo: using Unicode character */
            display: inline-block;
        }

        .section-title { 
            color: #ff9f00; 
            font-size: 1.8rem; 
            text-decoration: underline; 
            margin: 0;
            font-family: 'Source Code Pro', monospace;
            font-weight: 700;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 1.3rem; 
            /* Mode 7 font is only for the data rows, not the headers */
        }

        th { 
            text-align: left; 
            padding: 10px; 
            color: #9ca3af; 
            border-bottom: 1px solid #222; 
            font-weight: 700;
            font-family: 'Source Code Pro', monospace;
        }

        td { 
            padding: 10px; 
            border-bottom: 1px solid #111; 
            color: #ff9f00; /* Amber for data */
            font-family: 'Mode 7', monospace; /* The stylized, blocky font */
            letter-spacing: 1px;
        }

        /* Classes from your existing structure, updated for the new theme */
        .flight-id { 
            color: #ff9f00; 
            font-weight: bold; 
        }

        .aircraft-type { 
            color: #ff9f00; /* Reverted to amber to match the split-flap look */
        }

        .status-time { 
            color: #ff9f00; /* Time is amber in reference image */
        }
    </style>
</head>
<body>

<div class="board-container">
    <div class="header-section">
        <h1>KWVI CONTROL TOWER</h1>
        <div class="time-display" id="clock">00:00:00 PST</div>
    </div>

    <div class="section-header-container">
        <div class="plane-logo">&#9992;</div>
        <div class="section-title">DEPARTURES</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Flight</th>
                <th>Type</th>
                <th>Destination</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="departures-list">
            <tr><td colspan="4">LOADING DATA...</td></tr>
        </tbody>
    </table>

    <div class="section-header-container">
        <div class="plane-logo">&#9992;</div>
        <div class="section-title">ARRIVALS</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Flight</th>
                <th>Type</th>
                <th>Origin</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="arrivals-list">
            <tr><td colspan="4">LOADING DATA...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Live ticking clock (keep it PST)
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false }) + ' PST';
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Mapping function to correctly populate the new columns.
    // Ensure f.ident, f.type, f.origin/destination, and f.time all exist.
    fetch('Flights.json')
        .then(response => {
            if (!response.ok) throw new Error("Data file not found");
            return response.json();
        })
        .then(data => {
            // Populate Arrivals
            document.getElementById('arrivals-list').innerHTML = data.arrivals.map(f => 
                `<tr>
                    <td class="flight-id">${f.ident}</td>
                    <td class="aircraft-type">${f.type || 'GA'}</td>
                    <td>${f.origin}</td>
                    <td class="status-time">${f.time || '--:--'}</td>
                </tr>`
            ).join('');
            
            // Populate Departures
            document.getElementById('departures-list').innerHTML = data.departures.map(f => 
                `<tr>
                    <td class="flight-id">${f.ident}</td>
                    <td class="aircraft-type">${f.type || 'GA'}</td>
                    <td>${f.destination}</td>
                    <td class="status-time">${f.time || '--:--'}</td>
                </tr>`
            ).join('');
        })
        .catch(error => {
            console.error("Board Error:", error);
            document.getElementById('arrivals-list').innerHTML = `<tr><td colspan="4" style="color:#ff9f00;">AWAITING SIGNAL...</td></tr>`;
            document.getElementById('departures-list').innerHTML = `<tr><td colspan="4" style="color:#ff9f00;">AWAITING SIGNAL...</td></tr>`;
        });
</script>

</body>
</html>
