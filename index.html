<div class="section-title">ARRIVALS</div>
<table>
    <thead>
        <tr>
            <th>Flight</th>
            <th>Type</th> <th>Origin</th>
            <th>Time</th> </tr>
    </thead>
    <tbody id="arrivals-list">
        <tr><td colspan="4">LOADING...</td></tr>
    </tbody>
</table>

<script>
    fetch('Flights.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('arrivals-list').innerHTML = data.arrivals.map(f => 
                `<tr>
                    <td class="flight-id">${f.ident}</td>
                    <td style="color: #60a5fa">${f.type || 'GA'}</td>
                    <td>${f.origin}</td>
                    <td class="status-ontime">${f.time || '--:--'}</td>
                </tr>`
            ).join('');
            
            document.getElementById('departures-list').innerHTML = data.departures.map(f => 
                `<tr>
                    <td class="flight-id">${f.ident}</td>
                    <td style="color: #60a5fa">${f.type || 'GA'}</td>
                    <td>${f.destination}</td>
                    <td class="status-blink">${f.time || '--:--'}</td>
                </tr>`
            ).join('');
        });
</script>
