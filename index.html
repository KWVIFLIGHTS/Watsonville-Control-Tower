<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KWVI Flight Tracker</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary-blue: #1e3a8a;
            --accent-blue: #3b82f6;
            --text-dark: #334155;
            --text-light: #94a3b8;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary-blue); font-size: 2.5rem; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: var(--text-light); margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background-color: var(--card-bg); border-top: 5px solid var(--accent-blue); border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: var(--primary-blue); border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; margin-top: 0; }
        .flight-item { padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
        .tail-number { font-weight: bold; color: var(--accent-blue); }
    </style>
</head>
<body>
<div class="container">
    <h1>KWVI Watsonville Traffic</h1>
    <p class="subtitle">Auto-updates every 60 minutes</p>
    <div class="grid">
        <div class="card">
            <h2>🛬 Arrivals</h2>
            <div id="arrivals-list">Loading...</div>
        </div>
        <div class="card">
            <h2>🛫 Departures</h2>
            <div id="departures-list">Loading...</div>
        </div>
    </div>
</div>
<script>
    fetch('flights.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('arrivals-list').innerHTML = data.arrivals.map(f => `<div class="flight-item"><span class="tail-number">${f.ident}</span> from ${f.origin}</div>`).join('');
            document.getElementById('departures-list').innerHTML = data.departures.map(f => `<div class="flight-item"><span class="tail-number">${f.ident}</span> to ${f.destination}</div>`).join('');
        })
        .catch(error => {
            document.getElementById('arrivals-list').innerHTML = "Wait for next update...";
            document.getElementById('departures-list').innerHTML = "Wait for next update...";
        });
</script>
</body>
</html>
