name: Hourly Flight Update

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:        # Adds the manual "Run" button

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/python-version: '3.9'

      - name: Run Python Script
        run: python update_flights.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'actions@github.com'
          git add Flights.json
          git commit -m "Automated flight update" || exit 0
          git pull --rebase origin main  # Prevents the "Rejected" error
          git push origin main
